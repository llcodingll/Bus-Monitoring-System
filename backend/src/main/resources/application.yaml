spring:
  application:
    name: monitoringsystem
  config:
    import: optional:file:src/main/resources/.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/busmonitoring}
    username: ${DB_USERNAME:bususer}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
