services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: busmonitoring
      POSTGRES_USER: bususer
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bususer -d busmonitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/busmonitoring
      DB_USERNAME: bususer
      DB_PASSWORD:
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
